<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <title>Gerador de Codigo</title>
</head>

<body>
    <h1>CSS Gerador <span>por IA</span></h1>
    <p>Descreva sua ideia e a IA dará Vida!</p>
    <textarea rows="3" class="texto" placeholder="EX: Bola azul pingando"></textarea>
    <button class="botao-gerar">Gerar Codigo!</button>

    <div class="resultado">

        <div>
            <h2>Código</h2>
            <p class="bloco-codigo"></p>
        </div>

        <div>
            <h2>Preview</h2>
            <iframe class="resultado-codigo"></iframe>
        </div>

    </div>

</body>

<script src="scripts.js">

</script>

</html>
